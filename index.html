<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ozur dilerim ;c</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #fdf2f8;
            --card-bg: rgba(255, 255, 255, 0.8);
            --green-btn: #4ade80;
            --red-btn: #fb7185;
            --text-color: #4b5563;
            --accent-pink: #f472b6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            background-image: radial-gradient(circle at 20% 30%, #fce7f3 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, #fae8ff 0%, transparent 50%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-color);
        }

        .container {
            text-align: center;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 2rem;
            box-shadow: 0 20px 50px rgba(244, 114, 182, 0.15);
            max-width: 500px;
            width: 90%;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            font-weight: 600;
            color: #be185d;
        }

        .cat-container {
            width: 300px;
            height: auto;
            margin: 4rem auto 2rem;
            /* Üstten boşluk bırakıldı baloncuk için */
            position: relative;
            border-radius: 1rem;
            /* overflow: hidden silindi, baloncuk gözüksün diye */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .cat-image {
            width: 100%;
            display: block;
            border-radius: 1rem;
            /* Köşeleri burada yuvarlıyoruz */
        }

        .eye-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Cute SVG Cat Styles */
        #cat-svg {
            width: 100%;
            height: 100%;
        }

        .eye-pupil {
            transition: transform 0.1s ease-out;
        }

        .buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            user-select: none;
        }

        #green-btn {
            background-color: var(--green-btn);
            color: white;
        }

        #green-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(74, 222, 128, 0.4);
        }

        #red-btn {
            background-color: var(--red-btn);
            color: white;
            position: relative;
        }

        #red-btn:hover {
            transform: scale(0.95);
        }

        .message {
            margin-top: 1.5rem;
            font-weight: 600;
            color: #e11d48;
            height: 1.5rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .message.visible {
            opacity: 1;
        }

        /* Floating hearts for extra cuteness */
        .heart {
            position: absolute;
            pointer-events: none;
            animation: float 4s ease-in infinite;
            opacity: 0;
        }

        .speech-bubble {
            position: absolute;
            top: -75px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            background: #be185d;
            padding: 0.8rem 1.2rem;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            box-shadow: 0 10px 25px rgba(190, 24, 93, 0.4);
            white-space: nowrap;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid #be185d;
        }

        .speech-bubble.visible {
            transform: translateX(-50%) scale(1);
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 0.8;
            }

            90% {
                opacity: 0.8;
            }

            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="container" id="main-card">
        <div class="cat-container">
            <div id="speech-bubble" class="speech-bubble">Mesaj buraya gelecek</div>
            <img src="duduyatpng.png" alt="Dudu" class="cat-image">
            <svg class="eye-overlay" viewBox="0 0 594 567">
                <!-- Göz Akı (Beyaz Daireler) -->
                <circle cx="310" cy="160" r="18" fill="white" />
                <circle cx="360" cy="140" r="18" fill="white" />

                <g class="eye-pupil" id="left-pupil">
                    <circle cx="310" cy="160" r="10" fill="black" />
                </g>
                <g class="eye-pupil" id="right-pupil">
                    <circle cx="360" cy="140" r="10" fill="black" />
                </g>
            </svg>
        </div>

        <h1 id="main-title">barisalim mi🥺</h1>

        <div class="buttons" id="button-group">
            <button id="green-btn" class="btn">Barışalım</button>
            <button id="red-btn" class="btn">Küsüz</button>
        </div>

        <div id="warning-msg" class="message">mecbur buna tikliycan </div>
    </div>

    <script>
        const leftPupil = document.getElementById('left-pupil');
        const rightPupil = document.getElementById('right-pupil');
        const redBtn = document.getElementById('red-btn');
        const greenBtn = document.getElementById('green-btn');
        const warningMsg = document.getElementById('warning-msg');
        const mainTitle = document.getElementById('main-title');
        const speechBubble = document.getElementById('speech-bubble');

        let redClickCount = 0;
        let isAngry = false;
        let dodgeMode = false;

        const duduMessages = [
            "berk seni cok sebio barış bnce",
            "sebisip barışın bnce",
            "ya silaaaa barıs artıkk"
        ];

        // Eye tracking
        const handleMove = (x, y) => {
            if (isAngry) return;
            trackEye(x, y, leftPupil, 310, 160);
            trackEye(x, y, rightPupil, 360, 140);
        };

        document.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
        document.addEventListener('touchmove', (e) => {
            handleMove(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });
        document.addEventListener('touchstart', (e) => {
            handleMove(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });

        function trackEye(mouseX, mouseY, pupil, centerX, centerY) {
            const svg = document.querySelector('.eye-overlay');
            const rect = svg.getBoundingClientRect();

            // Convert page mouse coords to SVG relative coords
            const svgCenterX = rect.left + (centerX * rect.width / 594);
            const svgCenterY = rect.top + (centerY * rect.height / 567);

            const angle = Math.atan2(mouseY - svgCenterY, mouseX - svgCenterX);
            const distance = Math.min(6, Math.hypot(mouseX - svgCenterX, mouseY - svgCenterY) / 10);

            const dx = Math.cos(angle) * distance;
            const dy = Math.sin(angle) * distance;

            pupil.style.transform = `translate(${dx}px, ${dy}px)`;
        }

        // Red button interactions
        const handleDodgeTrigger = () => {
            if (dodgeMode) {
                isAngry = false;
                dodgeButton();
                return true;
            }
            return false;
        };

        redBtn.addEventListener('mouseenter', () => {
            if (handleDodgeTrigger()) return;

            // Look away logic
            isAngry = true;
            leftPupil.style.transform = `translate(8px, 0px)`;
            rightPupil.style.transform = `translate(8px, 0px)`;
        });

        redBtn.addEventListener('touchstart', (e) => {
            if (handleDodgeTrigger()) {
                e.preventDefault(); // Buton kaçtığında tıklamayı önlemek için
            }
        });

        redBtn.addEventListener('mouseleave', () => {
            if (dodgeMode) return;
            isAngry = false;
        });

        redBtn.addEventListener('click', () => {
            if (dodgeMode) return;

            redClickCount++;

            // Update speech bubble
            if (redClickCount <= duduMessages.length) {
                speechBubble.innerText = duduMessages[redClickCount - 1];
                speechBubble.classList.add('visible');
            }

            // Green button grows
            const scale = 1 + (redClickCount * 0.4);
            greenBtn.style.transform = `scale(${scale})`;

            if (redClickCount >= 3) {
                activateDodgeMode();
            }
        });

        function activateDodgeMode() {
            dodgeMode = true;
            isAngry = false;
            warningMsg.classList.add('visible');
            mainTitle.innerText = "DUDU SİNİRLENDİ";

            // Move button to body to ensure fixed position is relative to viewport
            document.body.appendChild(redBtn);
            redBtn.style.position = 'fixed';
            redBtn.style.zIndex = '9999';
            redBtn.style.transition = 'none'; // Jump instantly
            dodgeButton();
        }

        function dodgeButton() {
            const margin = 20; // Ekran kenarlarından minimum mesafe
            const maxX = Math.max(0, window.innerWidth - redBtn.offsetWidth - margin);
            const maxY = Math.max(0, window.innerHeight - redBtn.offsetHeight - margin);

            const newX = Math.random() * maxX;
            const newY = Math.random() * maxY;

            redBtn.style.left = `${newX}px`;
            redBtn.style.top = `${newY}px`;
        }

        greenBtn.addEventListener('click', () => {
            mainTitle.innerText = "Seni çok seviyorum! ❤️";
            document.getElementById('button-group').style.display = 'none';
            warningMsg.classList.remove('visible');
            startHearthRain();
        });

        function startHearthRain() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.className = 'heart';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
                heart.style.animationDuration = (Math.random() * 2 + 2) + 's';
                document.body.appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, 4000);
            }, 100);
        }
    </script>
</body>

</html>
